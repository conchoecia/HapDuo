name: Release to PyPI

# Builds an sdist + wheel from a tagged commit and publishes the package to
# PyPI via OIDC trusted publishing. No PyPI API tokens are stored in the
# repo — the workflow gets a short-lived credential from PyPI by proving
# its identity (this repository, this workflow, this environment) on every
# run.
#
# One-time setup (you do this once on pypi.org):
#   1. Make an account at https://pypi.org and verify your email.
#   2. Go to https://pypi.org/manage/account/publishing/ and click
#      "Add a new pending publisher".
#   3. Fill in:
#         PyPI project name:   hapduo
#         Owner:               conchoecia
#         Repository name:     HapDuo
#         Workflow filename:   release.yml
#         Environment name:    pypi
#   4. Save. The project will be created on PyPI on the first successful
#      publish.
#
# Once configured, cutting a release is just:
#   git tag v0.1.0
#   git push --tags
#
# (Or use the "Run workflow" button on the Actions tab; the workflow_dispatch
# trigger is included so you can publish from a branch without tagging.)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing — do not remove

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system build deps
        # hic-straw is a C++ extension that links against libcurl; the
        # Ubuntu runner doesn't ship the dev headers by default.
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Smoke-test the built wheel
        run: |
          pip install dist/*.whl
          hapduo-detect --help > /dev/null
          hapduo-style4   --help > /dev/null
          hapduo-batch    --help > /dev/null
          hapduo-ideogram --help > /dev/null
          hapduo-synteny  --help > /dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hapduo/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Attach distributions to the GitHub release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create / update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" --clobber
